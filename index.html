<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Core5</title>
    <link rel="icon" type="image/png" href="long base64 string">
    <style>
        /* Modern reset and centering layout */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e; 
        }

        /* Sleek central hub container */
        .container { 
            background: #161622; 
            color: #fff; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6); 
            width: 400px; 
            text-align: center;
            border: 1px solid #22223b;
        }

        /* Futuristic glowing title */
        h1 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 28px;
            color: #00ffcc;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        /* Clean link wrapper behavior */
        a {
            text-decoration: none;
            display: block;
            margin-bottom: 16px;
        }
        a:last-child {
            margin-bottom: 0;
        }

        /* Tactile, premium utility buttons */
        button { 
            width: 100%; 
            padding: 16px 20px; 
            font-weight: 600; 
            font-size: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            cursor: pointer; 
            color: white; 
            background: #22223b;
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
        }

        /* High-visibility active hover states */
        button:hover { 
            background: #4e54c8; 
            border-color: #00ffcc;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(78, 84, 200, 0.4);
        }

        /* Distinct look for the proxy system button */
        .proxy-btn:hover {
            background: #ff4757;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Elmo's Proxy (Remade)</h1>
    
    <a href="Cipher.html">
        <button type="button">Go to Decoder/Encoder</button>
    </a>
    
    <a href="ESPFS.html">
        <button type="button" class="proxy-btn">Go to Elmo's Proxy Site Fetching System (ESPFS)</button>
    </a>
</div>

</body>
</html>
